<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sajib Ahmed — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0e8;
      --fg: #1a1714;
      --accent: #ff4d00;
      --muted: #d4cec4;
      --mid: #e8e2d8;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
    }
    #cursor-ring {
      position: fixed;
      width: 40px; height: 40px;
      border: 1px solid rgba(26,23,20,0.25);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Grid lines */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(26,23,20,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,23,20,0.05) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* Main layout */
    .wrapper {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 6vw, 6rem);
      z-index: 1;
      overflow: hidden;
    }

    /* Giant background name */
    .bg-name {
      position: absolute;
      bottom: -0.15em;
      left: -0.02em;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(120px, 22vw, 340px);
      color: transparent;
      -webkit-text-stroke: 1px rgba(26,23,20,0.07);
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.02em;
    }

    /* Top bar */
    .topbar {
      position: absolute;
      top: clamp(1.5rem, 4vw, 3rem);
      left: clamp(2rem, 6vw, 6rem);
      right: clamp(2rem, 6vw, 6rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .topbar-tag {
      font-family: 'Poppins', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,23,20,0.35);
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(26,23,20,0.35);
    }
    .status-dot::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
    }

    .label {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(3.5rem, 10vw, 11rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 0.15em;
    }

    h1 .first {
      display: block;
      color: var(--fg);
      opacity: 0;
      animation: slideRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    h1 .last {
      display: block;
      color: transparent;
      -webkit-text-stroke: 2px var(--fg);
      opacity: 0;
      animation: slideRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
    }

    .divider {
      width: 0;
      height: 2px;
      background: var(--accent);
      margin: 2rem 0;
      animation: expandLine 0.8s ease 1.1s forwards;
    }

    .announcement {
      max-width: 520px;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.3s forwards;
    }

    .announcement p {
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      font-weight: 700;
      line-height: 1.4;
      color: var(--fg);
      margin-bottom: 0.75rem;
    }

    .announcement .sub {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(0.7rem, 1.3vw, 0.82rem);
      font-style: italic;
      color: rgba(26,23,20,0.45);
      line-height: 1.6;
      font-weight: 400;
    }

    /* Countdown / ETA bar */
    .eta-bar {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.5s forwards;
    }

    .eta-label {
      font-family: 'Poppins', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(26,23,20,0.35);
      margin-bottom: 0.6rem;
    }

    .progress-track {
      width: clamp(200px, 35vw, 400px);
      height: 2px;
      background: var(--muted);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      animation: fillBar 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1.8s forwards;
    }

    /* Corner accent */
    .corner-accent {
      position: absolute;
      bottom: clamp(1.5rem, 4vw, 3rem);
      right: clamp(2rem, 6vw, 6rem);
      text-align: right;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.6s forwards;
    }

    .corner-accent .year {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(3rem, 7vw, 7rem);
      color: transparent;
      -webkit-text-stroke: 1px rgba(26,23,20,0.1);
      line-height: 1;
    }

    .corner-accent .tagline {
      font-family: 'Poppins', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(26,23,20,0.25);
      text-transform: uppercase;
    }

    /* Floating orange square deco */
    .deco-square {
      position: absolute;
      width: clamp(60px, 8vw, 110px);
      aspect-ratio: 1;
      border: 2px solid var(--accent);
      top: clamp(4rem, 12vh, 9rem);
      right: clamp(4rem, 12vw, 14rem);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.8s forwards, floatSq 6s ease-in-out 2s infinite;
      z-index: 0;
    }
    .deco-square::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: var(--accent);
      opacity: 0.15;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-40px) skewX(-3deg); }
      to   { opacity: 1; transform: translateX(0) skewX(0deg); }
    }

    @keyframes expandLine {
      from { width: 0; }
      to   { width: clamp(60px, 12vw, 140px); }
    }

    @keyframes fillBar {
      from { width: 0%; }
      to   { width: 72%; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(1.5); }
    }

    @keyframes floatSq {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-18px) rotate(8deg); }
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      h1 .last { -webkit-text-stroke: 1px var(--fg); }
      .deco-square { display: none; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div class="grid-lines"></div>

  <div class="wrapper">

    <div class="topbar">
      <span class="topbar-tag">Portfolio — v1.0</span>
      <span class="status-dot">In development</span>
    </div>

    <div class="bg-name" aria-hidden="true">SAJIB</div>
    <div class="deco-square"></div>

    <div class="content">
      <div class="label">— Designer &amp; Developer</div>

      <h1>
        <span class="first">Sajib</span>
        <span class="last">Ahmed</span>
      </h1>

      <div class="divider"></div>

      <div class="announcement">
        <p>A portfolio worth the wait is on its way.</p>
        <p class="sub">
          Something carefully crafted is being built right now.<br/>
          Check back soon — it'll be worth the visit.
        </p>
      </div>

      <div class="eta-bar">
        <div class="eta-label">Progress</div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="corner-accent">
      <div class="year">2026</div>
      <div class="tagline">Coming soon</div>
    </div>

  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      ring.style.left   = e.clientX + 'px';
      ring.style.top    = e.clientY + 'px';
    });

    document.addEventListener('mousedown', () => {
      cursor.style.width  = '20px';
      cursor.style.height = '20px';
    });
    document.addEventListener('mouseup', () => {
      cursor.style.width  = '12px';
      cursor.style.height = '12px';
    });

    // Parallax on bg name
    const bgName = document.querySelector('.bg-name');
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth  - 0.5) * 18;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      bgName.style.transform = `translate(${x}px, ${y}px)`;
    });
  </script>

</body>
</html>
